<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - House of Kryo</title>
    <link rel="stylesheet" href="styles-enhanced.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/logo.jpg" alt="House of Kyro" class="logo-image">
                <span class="logo-text">House of Kyro</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
                <li>
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
                        <span id="theme-icon">🌙</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Success Section -->
    <section class="checkout-section" style="min-height: 70vh; display: flex; align-items: center;">
        <div class="container">
            <div class="text-center" id="success-content" style="max-width: 600px; margin: 0 auto;">
                <div style="width: 100px; height: 100px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 3rem; color: white; animation: scaleIn 0.5s ease;">✓</div>
                <h1 style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary);">Payment Successful!</h1>
                <p style="color: var(--mid-grey); margin-bottom: 2rem; font-size: 1.1rem;">Thank you for your purchase. Your order has been confirmed and is being processed.</p>
                <div style="background: var(--light-grey); padding: 2rem; border-radius: 16px; margin-bottom: 2rem;">
                    <p style="color: var(--mid-grey);">Order confirmation has been sent to your email.</p>
                </div>
                <a href="index.html" class="btn-primary">Continue Shopping</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 House of Kryo. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <style>
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>

    <script src="script-enhanced.js"></script>
    <script>
        updateCartCount();
        verifyPaymentAndDisplaySuccess();
    </script>
</body>
</html>
